variables:
  NODE_AUTH_TOKEN: $CI_JOB_TOKEN

stages:
  - publish

publish-packages:
  stage: publish
  image: node:22-alpine
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache jq bash git
  script:
    - corepack enable && corepack prepare yarn@1.22.22 --activate
    # `examples` is not published — drop it before install so its
    # next.js / react dependency tree never enters the runner disk.
    - rm -rf packages/examples
    # Configure npm + yarn auth against the GitLab project registry.
    - |
      REG_HOST="gitlab.all-mentors.ru"
      REG_PATH="api/v4/projects/${CI_PROJECT_ID}/packages/npm"
      cat > .npmrc <<EOF
      @tentacles:registry=https://${REG_HOST}/${REG_PATH}/
      //${REG_HOST}/${REG_PATH}/:_authToken=${NODE_AUTH_TOKEN}
      always-auth=true
      EOF
    # --ignore-scripts so husky's `prepare` hook doesn't try to install
    # git hooks inside the CI checkout.
    - yarn install --ignore-scripts
    - |
      set -e
      # Tag drives the version. Accept `vX.Y.Z` or `X.Y.Z`.
      version="${CI_COMMIT_TAG#v}"
      if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$'; then
        echo "✗ tag '$CI_COMMIT_TAG' is not a valid semver" >&2
        exit 1
      fi
      echo "→ publishing all packages at version $version (from tag $CI_COMMIT_TAG)"
      published=0
      skipped=0
      for dir in packages/*/; do
        pkg="${dir}package.json"
        [ -f "$pkg" ] || continue
        name=$(jq -r '.name' "$pkg")
        private=$(jq -r '.private // false' "$pkg")
        if [ "$private" = "true" ]; then
          echo "⊘ skip $name (private)"
          skipped=$((skipped+1))
          continue
        fi
        # Already in registry? Skip — tag may be re-run.
        if npm view "$name@$version" version >/dev/null 2>&1; then
          echo "✓ $name@$version already published"
          skipped=$((skipped+1))
          continue
        fi
        # Write tag-derived version into package.json before build/publish.
        tmp=$(mktemp)
        jq --arg v "$version" '.version = $v' "$pkg" > "$tmp" && mv "$tmp" "$pkg"
        echo "→ building $name@$version"
        (cd "$dir" && yarn build)
        echo "→ publishing $name@$version"
        (cd "$dir" && npm publish)
        published=$((published+1))
      done
      echo ""
      echo "Summary: $published published, $skipped skipped"
